# InkPot - 墨池

**英文名**: InkPot

**中文名**: 墨池

**描述**: 砚田勤耕，墨香留痕。让AI陪你沉淀每一份知识。

**分类**: 学习/知识管理

**标签**:
- 知识管理
- 自动学习
- 用户画像
- 学习伴侣

**安装**:
```bash
clawhub install inkpot
```

**使用**: 无需手动调用，自动在对话中识别知识点并记录。

---

## 功能特点

- **自动学习**: 识别对话中的知识点，自动归档
- **用户画像**: 分析用户行为，建立能力模型
- **知识关联**: 构建个人知识网络
- **智能推荐**: 基于画像推荐相关学习内容

---

## 命令

| 命令 | 说明 |
|------|------|
| `/墨池 画像` | 查看用户画像 |
| `/墨池 复习` | 智能推荐复习 |
| `/墨池 推荐` | 个性化学习推荐 |
| `/墨池 索引` | 查看知识库索引 |
| `/墨池 搜索 <关键词>` | 搜索知识点 |

---

## 知识库结构

```
knowledge/
├── 编程语言/
├── 算法数据结构/
├── 数学/
├── 计算机基础/
├── 人工智能/
└── 其他/
```

